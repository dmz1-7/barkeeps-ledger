<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d8202c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Barkeep&rsquo;s Ledger</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" href="/static/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Alfa+Slab+One&family=Libre+Franklin:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- Login gate (shown only when a passcode is configured) -->
  <div id="gate" class="gate hidden">
    <div class="gate-card">
      <div class="crest">&#x2615;</div>
      <h1 class="brand">Barkeep&rsquo;s Ledger</h1>
      <p class="gate-sub">Pull up a stool</p>
      <form id="gate-form">
        <input type="password" id="gate-pw" placeholder="Passcode" autocomplete="current-password" />
        <button type="submit" class="btn btn-brass">Enter</button>
      </form>
      <p id="gate-err" class="err"></p>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <button id="navtoggle" class="hamburger" aria-label="Menu">&#x2630;</button>
        <span class="crest sm">&#x2615;</span>
        <h1 class="brand">Barkeep&rsquo;s Ledger</h1>
        <select id="loc-switch" class="loc-switch" aria-label="Location"></select>
      </div>
      <div class="rule-double"></div>
    </header>

    <div class="shell">
      <aside id="sidebar" class="sidebar">
        <nav id="nav"></nav>
      </aside>
      <div id="scrim" class="scrim hidden"></div>
      <main id="view" class="view"></main>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
