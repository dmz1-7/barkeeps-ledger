<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d8202c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Barkeep&rsquo;s Ledger</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" href="/static/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Alfa+Slab+One&family=Libre+Franklin:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- Login gate (shown only when a passcode is configured) -->
  <div id="gate" class="gate hidden">
    <div class="gate-card">
      <div class="crest">&#x2615;</div>
      <h1 class="brand">Barkeep&rsquo;s Ledger</h1>
      <p class="gate-sub">Pull up a stool</p>
      <form id="gate-form">
        <input type="password" id="gate-pw" placeholder="Passcode" autocomplete="current-password" />
        <button type="submit" class="btn btn-brass">Enter</button>
      </form>
      <p id="gate-err" class="err"></p>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <span class="crest sm">&#x2615;</span>
        <h1 class="brand">Barkeep&rsquo;s Ledger</h1>
      </div>
      <div class="rule-double"></div>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar">
      <a href="#/dashboard" data-tab="dashboard"><span class="ic">&#x1F4CA;</span><b>Numbers</b></a>
      <a href="#/invoices"  data-tab="invoices"><span class="ic">&#x1F9FE;</span><b>Invoices</b></a>
      <a href="#/inventory" data-tab="inventory"><span class="ic">&#x1F4E6;</span><b>Stock</b></a>
      <a href="#/vendors"   data-tab="vendors"><span class="ic">&#x1F69A;</span><b>Vendors</b></a>
      <a href="#/count"     data-tab="count"><span class="ic">&#x1F522;</span><b>Count</b></a>
      <a href="#/settings"  data-tab="settings"><span class="ic">&#x2699;</span><b>Settings</b></a>
    </nav>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
